  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r=0){
    r=Math.min(r,Math.min(w,h)/2);this.beginPath();
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);

let actx=null,eng=null,musicOn=false,melTO=null,bassTO=null,drTO=null;
// 5 gears: speed thresholds (in-game units)
const GT=[0,48,98,155,210,265];
const GB=[88,80,74,70,66];  // base freq per gear
const GP=[168,182,194,204,216]; // peak freq per gear

function initAudio(){if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();}

function startEngine(){
  if(!actx)return;stopEngine();
  const master=actx.createGain();master.gain.value=0.38;master.connect(actx.destination);
  const o1=actx.createOscillator();o1.type='sawtooth';o1.frequency.value=88;
  const o2=actx.createOscillator();o2.type='square';o2.frequency.value=55;
  const curve=new Float32Array(256);
  for(let i=0;i<256;i++){const x=(2*i/255)-1;curve[i]=(Math.PI+220)*x/(Math.PI+220*Math.abs(x));}
  const dist=actx.createWaveShaper();dist.curve=curve;dist.oversample='2x';
  const filt=actx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=420;filt.Q.value=2.5;
  const gain=actx.createGain();gain.gain.value=0;
  o1.connect(dist);o2.connect(dist);dist.connect(filt);filt.connect(gain);gain.connect(master);
  o1.start();o2.start();
  gain.gain.setTargetAtTime(0.28,actx.currentTime,0.35);
  eng={o1,o2,filt,gain};
}
function updateEngine(gear,rpm,nitro){
  if(!eng||!actx)return;
  const g=Math.max(0,Math.min(4,gear-1));
  const f=GB[g]+rpm*(GP[g]-GB[g]);
  const nm=nitro?1.45:1;
  eng.o1.frequency.setTargetAtTime(f*nm,actx.currentTime,0.04);
  eng.o2.frequency.setTargetAtTime(f*0.62*nm,actx.currentTime,0.04);
  eng.filt.frequency.setTargetAtTime(300+rpm*800+(nitro?1200:0),actx.currentTime,0.04);
  eng.gain.gain.setTargetAtTime(0.12+rpm*0.22+(nitro?0.12:0),actx.currentTime,0.04);
}
function stopEngine(){
  if(!eng)return;
  try{eng.gain.gain.setTargetAtTime(0,actx.currentTime,0.18);}catch(e){}
  const old=eng;eng=null;
  setTimeout(()=>{try{old.o1.stop();old.o2.stop();}catch(e){}},300);
}
function playGearShift(up){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(up?380:220,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(up?95:340,actx.currentTime+0.09);
  g.gain.setValueAtTime(0.14,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.11);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+0.12);
}
function playNitroSound(){
  if(!actx)return;
  const len=Math.floor(actx.sampleRate*0.4),buf=actx.createBuffer(1,len,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,0.4);
  const src=actx.createBufferSource();src.buffer=buf;
  const filt=actx.createBiquadFilter();filt.type='bandpass';filt.frequency.value=1800;filt.Q.value=1.2;
  const g=actx.createGain();g.gain.setValueAtTime(0.55,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.4);
  src.connect(filt);filt.connect(g);g.connect(actx.destination);src.start();
  const o=actx.createOscillator(),g2=actx.createGain();
  o.type='sine';o.frequency.setValueAtTime(1200,actx.currentTime);o.frequency.exponentialRampToValueAtTime(2200,actx.currentTime+0.22);
  g2.gain.setValueAtTime(0.2,actx.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.28);
  o.connect(g2);g2.connect(actx.destination);o.start();o.stop(actx.currentTime+0.3);
}
const BPM=172,BEAT=60000/BPM;
const N={C3:130.81,G3:196,F3:174.61,A3:220,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880};
const MEL=[[N.G5,.5],[N.E5,.5],[N.G5,.5],[N.A5,.5],[N.G5,1],[N.E5,.5],[N.C5,.5],[N.D5,.5],[N.E5,.5],[N.D5,.5],[N.C5,.5],[0,.5],[N.G4,.5],[N.C5,1],[N.G5,.5],[N.E5,.5],[N.G5,.5],[N.A5,.5],[N.G5,1],[N.F5,.5],[N.E5,.5],[N.D5,.5],[N.C5,.5],[N.D5,.5],[N.E5,.5],[N.C5,2],[N.E5,.5],[N.F5,.5],[N.G5,.5],[N.A5,.5],[N.G5,1],[N.F5,.5],[N.E5,.5],[N.D5,.5],[N.E5,.5],[N.F5,.5],[N.E5,.5],[N.D5,2],[N.C5,.5],[N.D5,.5],[N.E5,.5],[N.G5,.5],[N.A5,1],[N.G5,.5],[N.E5,.5],[N.D5,.5],[N.E5,.5],[N.D5,.5],[N.C5,.5],[N.C5,2]];
const BASS=[[N.C3,2],[N.G3,2],[N.F3,2],[N.G3,2],[N.C3,2],[N.A3,2],[N.F3,2],[N.G3,2]];
function sTone(f,dur,type,vol,delay){
  if(!actx||!musicOn||f===0)return;
  setTimeout(()=>{if(!musicOn)return;const o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur*0.001);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur*0.001);},delay);
}
function sDrum(f,dec,delay,vol){if(!actx||!musicOn)return;setTimeout(()=>{if(!musicOn)return;const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.setValueAtTime(f,actx.currentTime);o.frequency.exponentialRampToValueAtTime(f*0.08,actx.currentTime+dec*0.001);g.gain.setValueAtTime(vol,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dec*0.001);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dec*0.001);},delay);}
function sHat(delay){if(!actx||!musicOn)return;setTimeout(()=>{if(!musicOn)return;const n=Math.floor(actx.sampleRate*0.05),buf=actx.createBuffer(1,n,actx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;const src=actx.createBufferSource();src.buffer=buf;const f=actx.createBiquadFilter();f.type='highpass';f.frequency.value=7500;const g=actx.createGain();g.gain.setValueAtTime(0.034,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.05);src.connect(f);f.connect(g);g.connect(actx.destination);src.start();},delay);}
function loopMel(){if(!musicOn)return;let t=0;for(const[f,b]of MEL){sTone(f,b*BEAT*0.82,'square',0.055,t);t+=b*BEAT;}melTO=setTimeout(loopMel,t);}
function loopBass(){if(!musicOn)return;let t=0;for(const[f,b]of BASS){sTone(f,b*BEAT*0.7,'triangle',0.045,t);t+=b*BEAT;}bassTO=setTimeout(loopBass,t);}
function loopDrums(){if(!musicOn)return;const bar=8*BEAT;for(let i=0;i<8;i++){if(i%4===0)sDrum(160,130,i*BEAT,0.48);if(i%4===2)sDrum(110,80,i*BEAT,0.22);sHat(i*BEAT);sHat(i*BEAT+BEAT*0.5);}drTO=setTimeout(loopDrums,bar);}
function startMusic(){if(musicOn)return;musicOn=true;loopMel();loopBass();loopDrums();}
function stopMusic(){musicOn=false;[melTO,bassTO,drTO].forEach(t=>{if(t)clearTimeout(t);});melTO=bassTO=drTO=null;}
function playBeep(freq,dur,vol=0.25){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(vol,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);}
function playFanfare(){if(!actx)return;const seq=[[524,.1],[659,.1],[784,.1],[1047,.35],[784,.12],[1047,.55]];let t=0;seq.forEach(([f,d])=>{setTimeout(()=>playBeep(f,d,0.18),t*1000);t+=d;});}
function playFinishMelody(){
  if(!actx)return;
  const seq=[[784,.12,.22],[880,.12,.22],[1047,.22,.28],[880,.1,.18],[1047,.1,.18],[1175,.45,.30],[0,.08,0],[1047,.12,.22],[988,.12,.20],[880,.12,.20],[784,.12,.18],[880,.30,.22],[0,.06,0],[784,.12,.22],[1047,.12,.25],[1319,.12,.28],[1568,.55,.32],[0,.08,0],[1319,.12,.22],[1568,.75,.28]];
  let t=0;for(const[f,d,v]of seq){if(f>0){const dl=t;setTimeout(()=>{if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d*.9);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d);const o2=actx.createOscillator(),g2=actx.createGain();o2.type='sine';o2.frequency.value=f*.667;g2.gain.setValueAtTime(v*.4,actx.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d*.85);o2.connect(g2);g2.connect(actx.destination);o2.start();o2.stop(actx.currentTime+d);},dl*1000);}t+=d;}
}

function mkRng(seed){let s=seed|0;return()=>{s=(Math.imul(s^(s>>>17),0x45d9f3b)^(s>>>7))>>>0;return s/0xffffffff;};}
function distSeg2(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,l=dx*dx+dy*dy;if(!l)return(px-ax)**2+(py-ay)**2;const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l));return(px-ax-t*dx)**2+(py-ay-t*dy)**2;}
function nearTrack(x,y,trk,d){const d2=d*d,pts=trk.pts,n=pts.length;for(let i=0;i<n;i++){const[ax,ay]=pts[i],[bx,by]=pts[(i+1)%n];if(distSeg2(x,y,ax,ay,bx,by)<d2)return true;}return false;}
function onTrack(x,y,trk){return nearTrack(x,y,trk,ROAD_W/2+16);}
function nearestOnTrack(x,y,trk){
  const pts=trk.pts,n=pts.length;let bD=Infinity,bPx=x,bPy=y;
  for(let i=0;i<n;i++){const[ax,ay]=pts[i],[bx,by]=pts[(i+1)%n];const dx=bx-ax,dy=by-ay,l=dx*dx+dy*dy;if(!l)continue;const t=Math.max(0,Math.min(1,((x-ax)*dx+(y-ay)*dy)/l));const px=ax+t*dx,py=ay+t*dy,d=Math.hypot(x-px,y-py);if(d<bD){bD=d;bPx=px;bPy=py;}}
  return{px:bPx,py:bPy,dist:bD};
}
function clampToTrack(car,trk){
  const limit=ROAD_W/2-3,{px,py,dist}=nearestOnTrack(car.x,car.y,trk);
  if(dist>limit&&dist>0.01){
    const nx=(car.x-px)/dist,ny=(car.y-py)/dist;
    car.x=px+nx*limit;car.y=py+ny*limit;
    const vx=Math.cos(car.ang)*car.spd,vy=Math.sin(car.ang)*car.spd,vOut=vx*nx+vy*ny;
    if(vOut>0){const tx=vx-vOut*nx,ty=vy-vOut*ny,ns=Math.hypot(tx,ty)*0.72;if(ns>0.1){car.ang=Math.atan2(ty,tx);car.spd=ns;}else car.spd*=0.5;}
    return true;
  }
  return false;
}
function resolveCarCollisions(cars){
  const R=24;
  for(let i=0;i<cars.length;i++)for(let j=i+1;j<cars.length;j++){
    const a=cars[i],b=cars[j],dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy);
    if(dist<R*2&&dist>1){
      const ov=R*2-dist,nx=dx/dist,ny=dy/dist;
      const avx=Math.cos(a.ang)*a.spd,avy=Math.sin(a.ang)*a.spd;
      const bvx=Math.cos(b.ang)*b.spd,bvy=Math.sin(b.ang)*b.spd;
      const rV=(bvx-avx)*nx+(bvy-avy)*ny;
      if(rV<8){a.x-=nx*ov*.35;a.y-=ny*ov*.35;b.x+=nx*ov*.35;b.y+=ny*ov*.35;if(rV<0){const imp=rV*.18;a.spd=Math.max(a.spd*.93,a.spd+imp*.5);b.spd=Math.max(b.spd*.93,b.spd-imp*.5);}}
    }
  }
}
function genScenery(trk,seed){
  const rng=mkRng(seed),items=[],minD=ROAD_W/2+52;const count=trk.type==='forest'?280:185;let tries=0;
  while(items.length<count&&tries<count*20){tries++;const x=200+rng()*2600,y=200+rng()*2200;if(nearTrack(x,y,trk,minD))continue;
    if(trk.type==='forest'){const sz=10+rng()*24;items.push({type:'tree',x,y,sz,col:trk.treeColors[Math.floor(rng()*trk.treeColors.length)]});}
    else{if(rng()<.65){const bw=36+rng()*74,bh=26+rng()*64,col=trk.bldColors[Math.floor(rng()*trk.bldColors.length)];const wr=Math.max(1,Math.floor(bh/14)),wc=Math.max(1,Math.floor(bw/14));const wins=[];for(let i=0;i<wr*wc;i++)wins.push(rng()>.38);items.push({type:'bld',x,y,bw,bh,col,wr,wc,wins});}else{const sz=7+rng()*14;items.push({type:'tree',x,y,sz,col:trk.treeColors[Math.floor(rng()*trk.treeColors.length)]});}}
  }
  return items;
}
TRACKS[0].scenery=genScenery(TRACKS[0],42);
TRACKS[1].scenery=genScenery(TRACKS[1],99);

// ═══════════════ ITEMS ═══════════════
const NITRO_BOOST=58,NITRO_DUR=0.75,NITRO_RESPAWN=14;
const SLOW_PENALTY=65,SLOW_DUR=1.2,SLOW_RESPAWN=16;
let nitroPickups=[],slowPickups=[],nitroFlash=0,slowFlash=0;
function genNitroPickups(trk){
  const pts=trk.pts,n=pts.length;
  return[.08,.22,.37,.52,.67,.83].map((f,idx)=>{
    const ri=f*n,si=Math.floor(ri)%n,t2=ri-Math.floor(ri);
    const[ax,ay]=pts[si],[bx,by]=pts[(si+1)%n];
    const sa=Math.atan2(by-ay,bx-ax),side=(idx%2===0?1:-1)*30;
    return{x:ax+(bx-ax)*t2+Math.cos(sa-Math.PI/2)*side,y:ay+(by-ay)*t2+Math.sin(sa-Math.PI/2)*side,active:true,respawn:0,anim:idx*.8};
  });
}
function genSlowPickups(trk){
  const pts=trk.pts,n=pts.length;
  return[.14,.31,.48,.64,.79,.96].map((f,idx)=>{
    const ri=f*n,si=Math.floor(ri)%n,t2=ri-Math.floor(ri);
    const[ax,ay]=pts[si],[bx,by]=pts[(si+1)%n];
    const sa=Math.atan2(by-ay,bx-ax),side=(idx%2===0?-1:1)*28;
    return{x:ax+(bx-ax)*t2+Math.cos(sa-Math.PI/2)*side,y:ay+(by-ay)*t2+Math.sin(sa-Math.PI/2)*side,active:true,respawn:0,anim:idx*1.1+0.5};
  });
}
function playSlowSound(){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(280,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(60,actx.currentTime+0.35);
  g.gain.setValueAtTime(0.35,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.4);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+0.4);
}
function updateNitroPickups(dt,cars){
  for(const np of nitroPickups){
    np.anim+=dt*2;
    if(!np.active){np.respawn-=dt;if(np.respawn<=0)np.active=true;continue;}
    for(const car of cars){
      if(Math.hypot(car.x-np.x,car.y-np.y)<40){
        np.active=false;np.respawn=NITRO_RESPAWN;car.nitroTime=NITRO_DUR;
        if(car.isPlayer){nitroFlash=0.9;playNitroSound();}
        else if(actx){const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=1400;g.gain.setValueAtTime(.07,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.15);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+.15);}
        break;
      }
    }
  }
  // Slow pickups
  for(const sp of slowPickups){
    sp.anim+=dt*1.8;
    if(!sp.active){sp.respawn-=dt;if(sp.respawn<=0)sp.active=true;continue;}
    for(const car of cars){
      if(Math.hypot(car.x-sp.x,car.y-sp.y)<40){
        sp.active=false;sp.respawn=SLOW_RESPAWN;car.slowTime=SLOW_DUR;
        if(car.isPlayer){slowFlash=0.85;playSlowSound();}
        else if(actx){const o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';o.frequency.value=180;g.gain.setValueAtTime(.06,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.2);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+.22);}
        break;
      }
    }
  }
  if(nitroFlash>0)nitroFlash=Math.max(0,nitroFlash-dt*3.5);
  if(slowFlash>0)slowFlash=Math.max(0,slowFlash-dt*2.5);
}
function drawNitroPickups(camX,camY){
  for(const np of nitroPickups){
    const sx=np.x-camX+W/2,sy=np.y-camY+H/2;
    if(sx<-60||sx>W+60||sy<-60||sy>H+60)continue;
    if(!np.active){ctx.save();ctx.globalAlpha=.22;ctx.strokeStyle='#00aaff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.stroke();ctx.restore();continue;}
    const pulse=.85+Math.sin(np.anim)*.15,glow=Math.abs(Math.sin(np.anim*1.5));
    ctx.save();
    const rg=ctx.createRadialGradient(sx,sy,2,sx,sy,26*pulse);
    rg.addColorStop(0,'rgba(0,180,255,.55)');rg.addColorStop(1,'rgba(0,180,255,0)');
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(sx,sy,26*pulse,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#fff';ctx.font=FB(10);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('N',sx,sy);ctx.textBaseline='alphabetic';ctx.restore();
  }
}
function drawSlowPickups(camX,camY){
  for(const sp of slowPickups){

}

// ═══════════════ CAR CLASS ═══════════════
const AI_COLORS=['#ff8800','#cc00cc','#00ccaa','#ffcc00','#ff5566','#55aaff','#aaff55'];
const AI_NAMES=['TURBO','FLASH','NİTRO','BLAZE','VİPER','STORM','BOLT'];
const AI_SPD=[218,225,232,238,221,229,236];
function lighten(hex,a){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+Math.floor(255*a));g=Math.min(255,g+Math.floor(255*a));b=Math.min(255,b+Math.floor(255*a));return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function darken(hex,a){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.max(0,r-Math.floor(255*a));g=Math.max(0,g-Math.floor(255*a));b=Math.max(0,b-Math.floor(255*a));return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}

class Car{
  constructor(x,y,ang,col,name,isPlayer,maxSpd=265){
    this.x=x;this.y=y;this.ang=ang;this.col=col;this.name=name;this.isPlayer=isPlayer;
    this.spd=0;this.maxSpd=maxSpd;this.acc=isPlayer?205:185;this.brk=385;this.fri=130;this.trn=2.45;
    this.offTrack=false;this.lap=0;this.cpIdx=0;this.prog=0;this.done=false;this.donePos=0;
    this.aiSkill=isPlayer?1:(0.88+Math.random()*.10);
    this.gear=1;this.gearRpm=0;this.nitroTime=0;this.slowTime=0;
    this.exhaust=[];this.w=28;this.h=48;
    this.num=isPlayer?'★':String(Math.floor(Math.random()*99)+1);
  }
  total(){return this.lap+this.prog;}
  calcGear(spd){
    const s=Math.abs(spd);
    for(let i=0;i<5;i++){if(s<=GT[i+1]||i===4){const lo=GT[i],hi=GT[i+1];return{gear:i+1,rpm:hi>lo?Math.max(0,Math.min(1,(s-lo)/(hi-lo))):0};}}
    return{gear:5,rpm:1};
  }
  advanceCp(trk){
    const pts=trk.pts,n=pts.length;
    for(let k=1;k<=3;k++){const ni=(this.cpIdx+k)%n;if(Math.hypot(this.x-pts[ni][0],this.y-pts[ni][1])<CP_R){for(let j=0;j<k;j++){const next=(this.cpIdx+1)%n;if(next===0)this.lap++;this.cpIdx=next;}break;}}
    const ni=(this.cpIdx+1)%n,seg=Math.hypot(pts[ni][0]-pts[this.cpIdx][0],pts[ni][1]-pts[this.cpIdx][1])||1;
    this.prog=(this.cpIdx+1-Math.min(1,Math.hypot(this.x-pts[ni][0],this.y-pts[ni][1])/seg))/n;
  }
  update(dt,ctrl,trk,fc){
    // Exhaust particles
    for(let i=this.exhaust.length-1;i>=0;i--){const p=this.exhaust[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.r*=.96;if(p.life<=0)this.exhaust.splice(i,1);}
    if(Math.abs(this.spd)>25&&Math.random()<.38){const ea=this.ang+Math.PI+(-0.28+Math.random()*.56);this.exhaust.push({x:this.x+Math.cos(this.ang+Math.PI)*this.h*.46,y:this.y+Math.sin(this.ang+Math.PI)*this.h*.46,vx:Math.cos(ea)*(6+Math.random()*14),vy:Math.sin(ea)*(6+Math.random()*14),r:2.5+Math.random()*3.5,life:.32+Math.random()*.22,maxLife:.55});}
    if(this.done){this.spd*=Math.pow(.88,dt*60);this.x+=Math.cos(this.ang)*this.spd*dt;this.y+=Math.sin(this.ang)*this.spd*dt;clampToTrack(this,trk);return;}
    if(this.nitroTime>0)this.nitroTime=Math.max(0,this.nitroTime-dt);
    if(this.slowTime>0)this.slowTime=Math.max(0,this.slowTime-dt);
    if(this.isPlayer)this._player(dt,ctrl,trk);
    else this._ai(dt,trk);
    this.advanceCp(trk);
    if(this.lap>=LAPS){this.done=true;this.donePos=++fc[0];if(this.isPlayer){stopEngine();stopMusic();playFinishMelody();}}
  }
  _player(dt,ctrl,trk){
    if(Math.abs(this.spd)>5){const sf=Math.min(1,55/Math.max(Math.abs(this.spd),1)),t=this.trn*dt*(0.28+0.72*sf),s=this.spd>0?1:-1;if(ctrl.left)this.ang-=t*s;if(ctrl.right)this.ang+=t*s;}
    const nitro=this.nitroTime>0,slow=this.slowTime>0;
    const ms=this.maxSpd+(nitro?NITRO_BOOST:0)-(slow?SLOW_PENALTY:0);
    if(ctrl.up)this.spd=Math.min(ms,this.spd+this.acc*dt);
    else if(ctrl.down)this.spd=Math.max(-ms*.32,this.spd-this.brk*dt);
    else{if(this.spd>0)this.spd=Math.max(0,this.spd-this.fri*dt);else if(this.spd<0)this.spd=Math.min(0,this.spd+this.fri*dt);}

    const{gear,rpm}=this.calcGear(this.spd);
    if(gear!==this.gear)playGearShift(gear>this.gear);
    this.gear=gear;this.gearRpm=rpm;
    updateEngine(gear,rpm,nitro);
  }
  _ai(dt,trk){
    const pts=trk.pts,n=pts.length;
    const ni=(this.cpIdx+1)%n,ni2=(this.cpIdx+2)%n;
    const[tx,ty]=pts[ni],[tx2,ty2]=pts[ni2];
    const dNext=Math.hypot(this.x-tx,this.y-ty);

    // Avoidance

    for(const o of cars){
      if(o===this)continue;const ddx=o.x-this.x,ddy=o.y-this.y,dd=Math.hypot(ddx,ddy);
      if(dd<4||dd>120)continue;
      const fwX=Math.cos(this.ang),fwY=Math.sin(this.ang),fw=(ddx*fwX+ddy*fwY)/dd;
      if(fw<.15)continue;

    let diff=Math.atan2(aimY-this.y,aimX-this.x)-this.ang;
    while(diff>Math.PI)diff-=2*Math.PI;while(diff<-Math.PI)diff+=2*Math.PI;

    let bF=1;
    for(const o of cars){if(o===this)continue;const ddx=o.x-this.x,ddy=o.y-this.y,dd=Math.hypot(ddx,ddy);if(dd>85)continue;const fw=(ddx*Math.cos(this.ang)+ddy*Math.sin(this.ang))/dd;if(fw>.7)bF=Math.min(bF,.52+dd/85*.48);}
    const nitro=this.nitroTime>0,slow=this.slowTime>0,ms=this.maxSpd+(nitro?NITRO_BOOST:0)-(slow?SLOW_PENALTY:0);
    const cf=Math.max(.26,1-Math.abs(diff)*.78);
    const tSpd=ms*cf*this.aiSkill*bF;
    if(this.spd<tSpd)this.spd=Math.min(tSpd,this.spd+this.acc*dt);
    else this.spd=Math.max(tSpd,this.spd-this.brk*.55*dt);
    this.spd=Math.max(0,Math.min(ms,this.spd));
    this.x+=Math.cos(this.ang)*this.spd*dt;this.y+=Math.sin(this.ang)*this.spd*dt;
    const wasOut=clampToTrack(this,trk);this.offTrack=wasOut;
    if(wasOut){const[cx,cy]=pts[this.cpIdx];let rec=Math.atan2(cy-this.y,cx-this.x)-this.ang;while(rec>Math.PI)rec-=2*Math.PI;while(rec<-Math.PI)rec+=2*Math.PI;this.ang+=Math.sign(rec)*Math.min(Math.abs(rec)*.7,steer*2);}
  }
  draw(camX,camY){
    const sx=this.x-camX+W/2,sy=this.y-camY+H/2;
    if(sx<-120||sx>W+120||sy<-120||sy>H+120)return;
    for(const p of this.exhaust){const al=Math.min(1,p.life/(p.maxLife||.55));ctx.save();ctx.globalAlpha=al*.42;ctx.fillStyle=this.nitroTime>0?'#44aaff':this.offTrack?'#aa9977':'#aaa';ctx.beginPath();ctx.arc(p.x-camX+W/2,p.y-camY+H/2,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
    ctx.save();ctx.translate(sx,sy);ctx.rotate(this.ang+Math.PI/2);
    const w=this.w,h=this.h;
    if(this.nitroTime>0){const ng=ctx.createRadialGradient(0,0,w*.3,0,0,w*1.5);ng.addColorStop(0,'rgba(0,120,255,.55)');ng.addColorStop(1,'rgba(0,120,255,0)');ctx.fillStyle=ng;ctx.beginPath();ctx.arc(0,0,w*1.5,0,Math.PI*2);ctx.fill();}
    if(this.slowTime>0){const sg=ctx.createRadialGradient(0,0,w*.3,0,0,w*1.4);sg.addColorStop(0,'rgba(255,40,0,.5)');sg.addColorStop(1,'rgba(255,40,0,0)');ctx.fillStyle=sg;ctx.beginPath();ctx.arc(0,0,w*1.4,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='rgba(0,0,0,.38)';ctx.beginPath();ctx.ellipse(4,6,w*.52,h*.22,0,0,Math.PI*2);ctx.fill();
    // Spoiler
    ctx.fillStyle='#111';ctx.fillRect(-w*.58,h*.42,w*1.16,3.5);ctx.fillRect(-w*.52,h*.36,3,6);ctx.fillRect(w*.52-3,h*.36,3,6);

    ctx.fillStyle='#555';ctx.fillRect(-w*.18,h*.45,5,7);ctx.fillRect(w*.18-5,h*.45,5,7);
    ctx.fillStyle='#888';ctx.fillRect(-w*.17,h*.46,3,5);ctx.fillRect(w*.18-4,h*.46,3,5);
    // Body
    const bg=ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
    bg.addColorStop(0,lighten(this.col,.45));bg.addColorStop(.4,this.col);bg.addColorStop(1,darken(this.col,.4));
    ctx.fillStyle=bg;ctx.beginPath();
    ctx.moveTo(-w/2+5,-h/2);ctx.lineTo(w/2-5,-h/2);ctx.lineTo(w/2,-h/2+8);ctx.lineTo(w/2,h/2-8);ctx.lineTo(w/2-4,h/2);ctx.lineTo(-w/2+4,h/2);ctx.lineTo(-w/2,h/2-8);ctx.lineTo(-w/2,-h/2+8);ctx.closePath();ctx.fill();
    // Side skirts
    ctx.fillStyle=darken(this.col,.55);ctx.fillRect(-w/2-3,-h*.15,4,h*.38);ctx.fillRect(w/2-1,-h*.15,4,h*.38);
    // Cabin
    ctx.fillStyle='#111';ctx.beginPath();ctx.moveTo(-w*.35,-h*.06);ctx.lineTo(-w*.27,-h*.28);ctx.lineTo(w*.27,-h*.28);ctx.lineTo(w*.35,-h*.06);ctx.lineTo(w*.35,h*.1);ctx.lineTo(-w*.35,h*.1);ctx.closePath();ctx.fill();
    // Windshield
    const wg=ctx.createLinearGradient(-w*.24,-h*.27,w*.24,-h*.07);wg.addColorStop(0,'rgba(190,230,255,.92)');wg.addColorStop(.45,'rgba(140,200,255,.75)');wg.addColorStop(1,'rgba(80,140,210,.55)');ctx.fillStyle=wg;ctx.beginPath();ctx.moveTo(-w*.24,-h*.08);ctx.lineTo(-w*.18,-h*.26);ctx.lineTo(w*.18,-h*.26);ctx.lineTo(w*.24,-h*.08);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.moveTo(-w*.16,-h*.24);ctx.lineTo(-w*.08,-h*.24);ctx.lineTo(-w*.12,-h*.11);ctx.lineTo(-w*.2,-h*.11);ctx.closePath();ctx.fill();

    ctx.fillStyle='rgba(100,160,220,.65)';ctx.beginPath();ctx.moveTo(-w*.22,h*.1);ctx.lineTo(-w*.28,h*.2);ctx.lineTo(w*.28,h*.2);ctx.lineTo(w*.22,h*.1);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.16)';ctx.fillRect(-w*.065,-h/2,w*.13,h);
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.ellipse(0,-h*.34,w*.1,h*.06,0,0,Math.PI*2);ctx.fill();
    // Headlights
    ctx.fillStyle=this.isPlayer?'rgba(220,240,255,.95)':'rgba(255,230,180,.88)';
    ctx.beginPath();ctx.ellipse(-w*.3,-h*.44,5,4,.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(w*.3,-h*.44,5,4,-.3,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='rgba(255,50,50,.9)';ctx.fillRect(-w*.36,h*.4,8,4);ctx.fillRect(w*.36-8,h*.4,8,4);

  }

// ═══════════════ GAME STATE ═══════════════
let ST='menu',selectedChar=null,trackIdx=0;
let cars=[],fc=[0],raceTimer=0,camX=1200,camY=900;
let cdVal=3,cdTimer=0,paused=false,lapFlash=0,prevLap=0;
let resReady=false,resElapsed=0,resStarted=false;
const titleCars=[{x:-120,y:0,spd:0,col:'#1a88ff'},{x:-320,y:0,spd:0,col:'#ff2222'},{x:-520,y:0,spd:0,col:'#ff8800'},{x:-720,y:0,spd:0,col:'#cc00cc'}];
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if((e.key==='p'||e.key==='P'||e.key==='Escape')&&ST==='race')paused=!paused;});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
const touch={up:false,down:false,left:false,right:false};let tbns=[];
function getCtrl(){return{up:keys['ArrowUp']||keys['w']||keys['W']||touch.up,down:keys['ArrowDown']||keys['s']||keys['S']||touch.down,left:keys['ArrowLeft']||keys['a']||keys['A']||touch.left,right:keys['ArrowRight']||keys['d']||keys['D']||touch.right};}
canvas.addEventListener('click',e=>{initAudio();handleClick(e.clientX,e.clientY);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();initAudio();for(const t of e.changedTouches){let onBtn=false;for(const b of tbns){if(t.clientX>=b.x&&t.clientX<=b.x+b.s&&t.clientY>=b.y&&t.clientY<=b.y+b.s){touch[b.k]=true;onBtn=true;}}if(!onBtn)handleClick(t.clientX,t.clientY);}},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();touch.up=touch.down=touch.left=touch.right=false;},{passive:false});
canvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
function handleClick(cx,cy){
  if(ST==='menu')ST='charsel';
  else if(ST==='charsel'){selectedChar=cx<W/2?'cagan':'yusuf';beginTrack(0);}
  else if(ST==='results'&&resReady){const pos=standings().findIndex(c=>c.isPlayer)+1;if(pos<=3){if(trackIdx<TRACKS.length-1)beginTrack(trackIdx+1);else{ST='trophy';stopMusic();playFanfare();setTimeout(playFanfare,1600);}}else beginTrack(trackIdx);}
  else if(ST==='trophy'){ST='menu';selectedChar=null;trackIdx=0;}
}
function beginTrack(ti){
  trackIdx=ti;const trk=TRACKS[ti],pts=trk.pts;
  const[sx,sy]=pts[0],[nx,ny]=pts[1];const ang=Math.atan2(ny-sy,nx-sx),perp=ang-Math.PI/2;
  cars=[];fc=[0];raceTimer=0;resElapsed=0;resStarted=false;resReady=false;prevLap=0;lapFlash=0;paused=false;cdVal=3;cdTimer=0;nitroFlash=0;slowFlash=0;
  const pCol=selectedChar==='cagan'?'#1a88ff':'#ff2222',pName=selectedChar==='cagan'?'ÇAĞAN ALP':'YUSUF';
  const lW=ROAD_W/3,rG=88,grid=[{c:1,r:0},{c:-1,r:1},{c:1,r:2},{c:-1,r:3},{c:1,r:4},{c:-1,r:5},{c:1,r:6},{c:-1,r:7}];
  for(let i=0;i<8;i++){const{c,r}=grid[i],px=sx+Math.cos(perp)*c*lW-Math.cos(ang)*(60+r*rG),py=sy+Math.sin(perp)*c*lW-Math.sin(ang)*(60+r*rG),isP=i===0;cars.push(new Car(px,py,ang,isP?pCol:AI_COLORS[i-1],isP?pName:AI_NAMES[i-1],isP,isP?265:AI_SPD[i-1]));}
  camX=cars[0].x;camY=cars[0].y;nitroPickups=genNitroPickups(trk);slowPickups=genSlowPickups(trk);startEngine();ST='countdown';
}
function standings(){return[...cars].sort((a,b)=>{if(a.done&&b.done)return a.donePos-b.donePos;if(a.done)return-1;if(b.done)return 1;return b.total()-a.total();});}

// ═══════════════ RENDERING ═══════════════
function drawTrackPath(pts){const n=pts.length;ctx.beginPath();ctx.moveTo(pts[0][0]-camX+W/2,pts[0][1]-camY+H/2);for(let i=1;i<=n;i++){const[x,y]=pts[i%n];ctx.lineTo(x-camX+W/2,y-camY+H/2);}ctx.closePath();}
function drawWorld(trk){
  ctx.fillStyle=trk.bgColor;ctx.fillRect(0,0,W,H);
  for(const o of trk.scenery){

// ── SPEEDOMETER GAUGE ──────────────────
function drawSpeedGauge(pl){
  // Size: fixed 160px radius, center anchored so gauge is fully inside
  const r=Math.min(160,Math.min(W,H)*.2);
  const cx=W-r-14,cy=H-r-14;  // center leaves full radius + margin
  const startA=Math.PI*.72,endA=Math.PI*2.28;
  const spd=Math.round(Math.abs(pl.spd)),maxD=330;
  const sf=Math.min(1,spd/maxD);
  const slow=pl.slowTime>0,nitro=pl.nitroTime>0;
  ctx.save();
  // Outer ring background
  ctx.fillStyle='rgba(0,0,0,.88)';ctx.beginPath();ctx.arc(cx,cy,r+10,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=slow?'rgba(255,60,0,.6)':nitro?'rgba(0,160,255,.6)':'rgba(255,255,255,.12)';
  ctx.lineWidth=3;ctx.stroke();
  // Ticks + labels
  for(let i=0;i<=11;i++){
    const f=i/11,a=startA+(endA-startA)*f,major=i%1===0;
    const r1=r*(i%2===0?.72:.82),r2=r*.92;
    ctx.strokeStyle=i%2===0?'rgba(255,255,255,.75)':'rgba(255,255,255,.3)';ctx.lineWidth=i%2===0?2.5:1.2;
    ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);ctx.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);ctx.stroke();
    if(i%2===0){
      const lv=Math.round(f*maxD/10)*10;
      ctx.fillStyle='rgba(255,255,255,.6)';ctx.font=FO(r*.1);ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(lv,cx+Math.cos(a)*r*.58,cy+Math.sin(a)*r*.58);
    }
  }
  // Background arc
  ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=r*.12;
  ctx.beginPath();ctx.arc(cx,cy,r*.82,startA,endA);ctx.stroke();
  // Speed arc (colour coded)
  if(sf>0){
    const na=startA+(endA-startA)*sf;
    const arcCol=slow?'#ff3300':sf>.82?'#ff3333':sf>.55?'#ffaa00':'#00ee88';
    ctx.strokeStyle=arcCol;ctx.lineWidth=r*.12;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(cx,cy,r*.82,startA,na);ctx.stroke();ctx.lineCap='butt';
  }
  // Needle
  const na2=startA+(endA-startA)*sf;
  ctx.strokeStyle='#ffffff';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-Math.cos(na2)*r*.2,cy-Math.sin(na2)*r*.2);
  ctx.lineTo(cx+Math.cos(na2)*r*.78,cy+Math.sin(na2)*r*.78);ctx.stroke();ctx.lineCap='butt';
  // Pivot
  ctx.fillStyle='#555';ctx.beginPath();ctx.arc(cx,cy,r*.11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ddd';ctx.beginPath();ctx.arc(cx,cy,r*.055,0,Math.PI*2);ctx.fill();
  // Speed number (large)
  ctx.fillStyle=nitro?'#44aaff':slow?'#ff6644':'#ffe600';
  ctx.font=FB(r*.28);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(spd,cx,cy+r*.16);
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font=FO(r*.11);ctx.fillText('KM/H',cx,cy+r*.36);
  // Gear badge (top of dial)
  const gearColors=['#888','#00ee88','#88ff44','#ffe600','#ffaa00','#ff4444'];
  const gc=gearColors[pl.gear]||'#888';
  ctx.fillStyle='rgba(0,0,0,.75)';ctx.beginPath();ctx.roundRect(cx-r*.22,cy-r*.82,r*.44,r*.32,6);ctx.fill();
  ctx.strokeStyle=gc;ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=gc;ctx.font=FB(r*.22);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('G'+pl.gear,cx,cy-r*.66);
  // Status bar (nitro/slow)
  if(nitro||slow){
    const barW=r*1.5,barX=cx-barW/2,barY=cy+r*.52,barH=r*.1;
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(barX,barY,barW,barH);
    const frac=nitro?pl.nitroTime/NITRO_DUR:pl.slowTime/SLOW_DUR;
    const barG=ctx.createLinearGradient(barX,0,barX+barW,0);
    if(nitro){barG.addColorStop(0,'#0044ff');barG.addColorStop(1,'#00ccff');}
    else{barG.addColorStop(0,'#cc0000');barG.addColorStop(1,'#ff6600');}
    ctx.fillStyle=barG;ctx.fillRect(barX,barY,barW*frac,barH);
    ctx.strokeStyle=nitro?'rgba(0,180,255,.6)':'rgba(255,80,0,.6)';ctx.lineWidth=1;ctx.strokeRect(barX,barY,barW,barH);
    ctx.fillStyle='#fff';ctx.font=FB(r*.09);ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(nitro?'⚡ NITRO':'⚠ YAVAŞ',cx,barY+barH/2);
  }
  ctx.textBaseline='alphabetic';ctx.restore();
}

  const pulse=.5+Math.sin(t*3.5)*.38;ctx.fillStyle=`rgba(255,230,0,${pulse+.22})`;ctx.font=FB(Math.min(16,W/50));ctx.fillText('▶  BAŞLAMAK İÇİN TIKLA',W/2,H*.82+Math.sin(t*3)*5);
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=FO(Math.min(10,W/80));ctx.fillText('PARKUR 1: İSTANBUL ÇEKMEKÖY 🌲     PARKUR 2: KOCAELİ GEBZE 🏭',W/2,H*.9);
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.font=FO(Math.min(8,W/100));ctx.fillText('OK TUŞLARI / WASD  |  P: DURAKLAT  |  ⚡ Nitro pikapları topla!',W/2,H-.20);
}
function drawCharSel(){
  const t=Date.now()/1000;const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#03050e');bg.addColorStop(1,'#080312');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);drawCheckered(0,0,W,36,18,.14);drawCheckered(0,H-36,W,36,18,.14);
  ctx.textAlign='center';ctx.fillStyle='#ffe600';ctx.font=FB(Math.min(20,W/36));ctx.fillText('YARIŞÇINI SEÇ',W/2,H*.11);ctx.fillStyle='rgba(255,255,255,.42)';ctx.font=FO(Math.min(10,W/70));ctx.fillText('Arabanı seç — yarışa atıl!',W/2,H*.18);
  const cw=Math.min(270,W*.38),ch=Math.min(400,H*.62),cy=H*.2,gap=Math.min(44,W*.05),lx=W/2-cw-gap/2,rx=W/2+gap/2;
  drawCharCard(lx,cy,cw,ch,'#1a88ff','ÇAĞAN ALP','🔵 MAVİ ARABA',t,0);drawCharCard(rx,cy,cw,ch,'#ff2222','YUSUF','🔴 KIRMIZI ARABA',t,1);
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.font=FO(Math.min(8,W/80));ctx.textAlign='center';ctx.fillText('Kontrol: OK TUŞLARI veya WASD  |  P: Duraklat',W/2,H*.93);ctx.fillText('İlk 3\'e girerek sıradaki parkura geç!',W/2,H*.97);
}
function drawCharCard(x,y,w,h,col,name,sub,t,idx){
  const pulse=Math.sin(t*2.8+idx*Math.PI)*.5+.5;ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(x+8,y+8,w,h);const bg=ctx.createLinearGradient(x,y,x+w,y+h);bg.addColorStop(0,col+'1e');bg.addColorStop(1,col+'0a');ctx.fillStyle=bg;ctx.fillRect(x,y,w,h);drawCheckered(x,y,36,36,9,.22);drawCheckered(x+w-36,y+h-36,36,36,9,.22);ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.strokeRect(x,y,w,h);ctx.strokeStyle=`${col}${Math.floor(pulse*120+30).toString(16).padStart(2,'0')}`;ctx.lineWidth=3;ctx.strokeRect(x-3,y-3,w+6,h+6);
  drawMenuCar(x+w/2,y+h*.48,col,1.4,-Math.PI/2);
  ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font=FB(Math.min(15,w/10));ctx.fillText(name,x+w/2,y+h*.15);ctx.fillStyle=col;ctx.font=FO(Math.min(9,w/18));ctx.fillText(sub,x+w/2,y+h*.22);
  const stats=[['HIZ',.88+idx*.05],['KONTROL',.82-idx*.06],['GÜVENİLİRLİK',.9+idx*.04]];
  for(let i=0;i<stats.length;i++){const[label,val]=stats[i],by=y+h*.67+i*h*.09;ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=FO(Math.min(6,w/26));ctx.textAlign='left';ctx.fillText(label,x+14,by);ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(x+14,by+4,w-28,6);const bG=ctx.createLinearGradient(x+14,by+4,x+14+(w-28)*val,by+4);bG.addColorStop(0,lighten(col,.1));bG.addColorStop(1,col);ctx.fillStyle=bG;ctx.fillRect(x+14,by+4,(w-28)*val,6);}
  ctx.textAlign='center';ctx.fillStyle=`rgba(255,220,0,${.55+pulse*.38})`;ctx.font=FB(Math.min(10,w/17));ctx.fillText('▶  SEÇ  ◀',x+w/2,y+h*.93);
}
function drawCountdown(){
  drawWorld(TRACKS[trackIdx]);for(const c of cars)c.draw(camX,camY);ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle='#ffe600';ctx.font=FB(Math.min(18,W/36));ctx.fillText(TRACKS[trackIdx].name,W/2,H*.27);ctx.fillStyle='rgba(255,255,255,.52)';ctx.font=FO(Math.min(10,W/60));ctx.fillText(TRACKS[trackIdx].icon+'  PARKUR '+(trackIdx+1)+' / 2    •    '+LAPS+' TUR',W/2,H*.37);
  if(cdVal>0){const sc=1+(1-(cdTimer%1))*.6;ctx.save();ctx.translate(W/2,H*.62);ctx.scale(sc,sc);ctx.fillStyle=cdVal===1?'#ff3333':'#ffe600';ctx.font=FB(Math.min(90,W/7));ctx.textAlign='center';ctx.fillText(cdVal,0,0);ctx.restore();}
  else{ctx.fillStyle='#00ff88';ctx.font=FB(Math.min(54,W/12));ctx.fillText('GİT! 🏁',W/2,H*.64);}
}
function drawResults(){
  const t=Date.now()/1000;const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#04050f');bg.addColorStop(1,'#0b0405');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);drawCheckered(0,0,W,36,18,.14);drawCheckered(0,H-36,W,36,18,.14);
  const st=standings(),pos=st.findIndex(c=>c.isPlayer)+1,ok=pos<=3;
  ctx.textAlign='center';ctx.fillStyle='#ffe600';ctx.font=FB(Math.min(18,W/36));ctx.fillText('PARKUR '+(trackIdx+1)+' SONUCU',W/2,H*.1);ctx.fillStyle=ok?'#00ff88':'#ff4444';ctx.font=FO(Math.min(11,W/55));ctx.fillText(ok?'🏆  Bravo! Bir sonraki parkura geçiyorsun!':'❌  Elendin! Tekrar dene!',W/2,H*.18);
  const bw=Math.min(420,W*.82),bx=W/2-bw/2,by=H*.23,bh=H*.52;ctx.fillStyle='rgba(0,0,0,.65)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.stroke();
  const med=['🥇','🥈','🥉','4.','5.','6.','7.','8.'];for(let i=0;i<Math.min(8,st.length);i++){const c=st[i],ry=by+36+i*(bh-48)/Math.min(8,st.length);ctx.fillStyle=c.isPlayer?(i<3?'#ffe600':'#ff5555'):'rgba(255,255,255,.65)';ctx.font=c.isPlayer?FB(Math.min(11,W/58)):FO(Math.min(11,W/58));ctx.textAlign='left';ctx.fillText(med[i]+'  '+c.name,bx+20,ry);ctx.fillStyle=c.col;ctx.beginPath();ctx.arc(bx+bw-30,ry-6,8,0,Math.PI*2);ctx.fill();if(c.done){ctx.fillStyle='#00ee88';ctx.font=FO(10);ctx.textAlign='right';ctx.fillText('TAMAMLANDI ✓',bx+bw-46,ry);}}
  if(resReady){const p=.5+Math.sin(t*4)*.38;ctx.fillStyle=`rgba(255,220,0,${p+.2})`;ctx.font=FB(Math.min(12,W/58));ctx.textAlign='center';const nxt=ok?(trackIdx<TRACKS.length-1?'▶  SONRAKİ PARKUR':'▶  KUPAYA GİT!  🏆'):'▶  TEKRAR DENE';ctx.fillText(nxt,W/2,H*.85+Math.sin(t*3)*4);}
}
function drawTrophy(){
  const t=Date.now()/1000;const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#0f0800');bg.addColorStop(1,'#050f00');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);drawCheckered(0,0,W,36,18,.18);drawCheckered(0,H-36,W,36,18,.18);
  for(let i=0;i<80;i++){ctx.fillStyle=`hsl(${i*47%360},90%,65%)`;ctx.globalAlpha=.15+Math.sin(t*1.4+i)*.25;const cx=(i*173+t*22*(i%3?1:-1))%W,cy=(i*89+t*35+Math.sin(t+i)*20)%H;ctx.fillRect(cx,cy,4+i%4,4+i%3);}ctx.globalAlpha=1;
  drawTrophyIcon(W/2,H*.35,Math.min(120,H*.16),t);
  ctx.textAlign='center';ctx.fillStyle='#ffe600';ctx.font=FB(Math.min(28,W/22));ctx.fillText('ŞAMPİYON! 🏆',W/2,H*.52);
  const cn=selectedChar==='cagan'?'ÇAĞAN ALP':'YUSUF',cc=selectedChar==='cagan'?'#1a88ff':'#ff2222';ctx.fillStyle=cc;ctx.font=FB(Math.min(22,W/28));ctx.fillText(cn,W/2,H*.61);
  ctx.fillStyle='rgba(255,255,255,.65)';ctx.font=FO(Math.min(10,W/62));ctx.fillText('Her iki parkuru da tamamladın!',W/2,H*.69);ctx.fillText('İSTANBUL ÇEKMEKÖY 🌲  +  KOCAELİ GEBZE 🏭',W/2,H*.75);
  drawTrophyIcon(W*.3,H*.75,Math.min(40,H*.055),t+2);drawTrophyIcon(W*.7,H*.75,Math.min(40,H*.055),t+3.5);
  const p=.45+Math.sin(t*3.2)*.42;ctx.fillStyle=`rgba(255,220,0,${p+.18})`;ctx.font=FB(Math.min(12,W/60));ctx.fillText('▶  ANA MENÜYE DÖN',W/2,H*.88+Math.sin(t*3)*5);
}

// ═══════════════ MAIN LOOP ═══════════════
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);const dt=Math.min((ts-lastT)/1000,.048);lastT=ts;
  if(ST==='menu'){drawMenu();return;}if(ST==='charsel'){drawCharSel();return;}if(ST==='trophy'){drawTrophy();return;}if(ST==='results'){drawResults();return;}
  if(ST==='countdown'){cdTimer+=dt;const nv=Math.max(0,4-Math.floor(cdTimer));if(nv!==cdVal&&nv>0)playBeep(nv===1?880:660,.15,.3);if(cdVal>0&&nv===0){playBeep(1320,.4,.4);startMusic();}cdVal=nv;drawCountdown();if(cdTimer>4.2)ST='race';return;}
  if(ST==='race'){
    if(!paused){
      raceTimer+=dt;const ctrl=getCtrl();
      if(!cars.every(c=>c.done))for(const c of cars)c.update(dt,ctrl,TRACKS[trackIdx],fc);
      resolveCarCollisions(cars);
      updateNitroPickups(dt,cars);
      camX+=(cars[0].x-camX)*Math.min(1,dt*9.5);camY+=(cars[0].y-camY)*Math.min(1,dt*9.5);
      if(cars[0].lap>prevLap){lapFlash=1.2;prevLap=cars[0].lap;if(prevLap<LAPS)playBeep(880,.25,.3);}
      if(lapFlash>0)lapFlash=Math.max(0,lapFlash-dt*1.9);
      if(cars[0].done){if(!resStarted)resStarted=true;resElapsed+=dt;if(resElapsed>3.2){ST='results';stopMusic();stopEngine();setTimeout(()=>resReady=true,1100);}}
    }
    drawWorld(TRACKS[trackIdx]);for(const c of [...cars].reverse())c.draw(camX,camY);drawHUD();drawTouchBtns();
    if(paused){ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#ffe600';ctx.font=FB(Math.min(22,W/28));ctx.fillText('DURAKLATILDI',W/2,H/2-20);ctx.fillStyle='rgba(255,255,255,.55)';ctx.font=FO(Math.min(10,W/60));ctx.fillText('P veya ESC ile devam et',W/2,H/2+18);}
  }
}
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
